<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board — Kanban</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { overflow: hidden; }
    .board-body { height: calc(100vh - 56px); }
  </style>
</head>
<body>

  <!-- Board header -->
  <header class="board-header">
    <button class="icon-btn" id="back-btn" title="Back to boards">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5m0 0 7 7m-7-7 7-7"/>
      </svg>
    </button>

    <span class="board-header__title" id="board-title" contenteditable="true" spellcheck="false"></span>

    <input type="search" id="search-input" class="board-header__search" placeholder="Search cards  /" aria-label="Search cards">

    <div class="board-header__actions">
      <select id="tag-filter" class="tag-filter" aria-label="Filter by tag">
        <option value="">All tags</option>
      </select>

      <button class="btn" id="export-btn" title="Export board as JSON">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>

      <button class="btn" id="add-column-btn" title="Add column">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 0 1 .75.75v4.5h4.5a.75.75 0 0 1 0 1.5h-4.5v4.5a.75.75 0 0 1-1.5 0v-4.5h-4.5a.75.75 0 0 1 0-1.5h4.5v-4.5A.75.75 0 0 1 8 2Z"/></svg>
        Add Column
      </button>
    </div>
  </header>

  <!-- Board body: columns -->
  <div id="columns-container" class="board-body"></div>

  <!-- Card Modal -->
  <div id="card-modal" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-label="Card details">
      <div class="modal__header">
        <h2>Card</h2>
        <button class="icon-btn" id="modal-cancel" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="modal__body">
        <!-- Image zone -->
        <div class="form-group">
          <label class="form-label">Image</label>
          <div class="image-zone" id="modal-image-label">
            <img id="modal-image-preview" class="image-zone__preview" src="" alt="Card image" hidden>
            <div id="modal-no-image" class="image-zone__placeholder">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="m21 15-5-5L5 21"/>
              </svg>
              <span>Click to browse, drag an image, or paste (⌘V)</span>
            </div>
            <button id="modal-remove-image" class="image-zone__remove" hidden type="button">Remove</button>
          </div>
          <input type="file" id="modal-image-file" accept="image/*" hidden>
        </div>

        <!-- Title -->
        <div class="form-group">
          <label class="form-label" for="modal-title">Title</label>
          <input type="text" id="modal-title" class="form-input" placeholder="Card title" maxlength="120" autocomplete="off">
        </div>

        <!-- Notes -->
        <div class="form-group">
          <label class="form-label" for="modal-notes">Notes</label>
          <textarea id="modal-notes" class="form-textarea" placeholder="Add notes…" rows="3"></textarea>
        </div>

        <!-- Source URL -->
        <div class="form-group">
          <label class="form-label" for="modal-source-url">Source URL</label>
          <input type="url" id="modal-source-url" class="form-input" placeholder="https://…">
        </div>

        <!-- Tags -->
        <div class="form-group">
          <label class="form-label">Tags</label>
          <div id="modal-tag-picker"></div>
        </div>

        <!-- Size warning -->
        <div id="size-warning" class="size-warning" hidden></div>
      </div>

      <div class="modal__footer">
        <div class="modal__footer-left">
          <button class="btn btn--sm btn--danger" id="modal-delete">Delete</button>
          <span class="modal-timestamps" id="modal-timestamps"></span>
        </div>
        <div class="modal__footer-right">
          <button class="btn btn--sm" id="modal-cancel-2">Cancel</button>
          <button class="btn btn--sm btn--primary" id="modal-save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox__close" id="lightbox-close" aria-label="Close lightbox">×</button>
    <img id="lightbox-img" src="" alt="Full size image">
  </div>

  <script src="js/storage.js"></script>
  <script src="js/drag.js"></script>
  <script src="js/modal.js"></script>
  <script src="js/board.js"></script>
  <script>
    // Wire up secondary cancel button
    document.getElementById('modal-cancel-2').addEventListener('click', () => {
      document.getElementById('modal-cancel').click();
    });
    // Show/hide remove-image button based on image presence
    document.getElementById('modal-image-preview').addEventListener('load', function() {
      document.getElementById('modal-remove-image').hidden = !this.src || this.src === window.location.href;
    });
  </script>
</body>
</html>
