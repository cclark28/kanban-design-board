  <!-- New Board Dialog -->
  <div id="new-board-dialog" class="dialog-backdrop" hidden>
    <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="dialog-title">
      <h2 id="dialog-title">New Board</h2>
      <div class="form-group">
        <label class="form-label" for="new-board-name">Board name</label>
        <input type="text" id="new-board-name" class="form-input" placeholder="e.g. UI Inspiration" maxlength="60" autocomplete="off">
      </div>
      <div class="form-group" style="margin-top:14px">
        <label class="form-label" for="new-board-color">Accent color</label>
        <div class="dialog-row">
          <input type="color" id="new-board-color" value="#0066fc" style="width:40px;height:36px;padding:2px;border:1.5px solid var(--color-border);border-radius:8px;cursor:pointer">
          <div id="color-presets" style="display:flex;gap:7px;align-items:center;flex-wrap:wrap"></div>
        </div>
      </div>
      <div class="dialog-actions">
        <button class="btn" id="new-board-cancel">Cancel</button>
        <button class="btn btn--primary" id="new-board-submit">Create Board</button>
      </div>
    </div>
  </div>

  <!-- Import drop overlay -->
  <div id="import-drop" class="import-drop-overlay" hidden>
    <span class="material-icons" style="margin-right:8px">upload_file</span>
    Drop JSON to import board
  </div>

  <script src="js/storage.js"></script>
  <script src="js/home.js"></script>
  <script>
    document.getElementById('new-board-btn-2').addEventListener('click', () => {
      document.getElementById('new-board-btn').click();
    });

    const presets = ['#0066fc','#05195f','#d52c5a','#00b4d8','#7c3aed','#059669','#f59e0b','#64748b'];
    const container = document.getElementById('color-presets');
    presets.forEach(c => {
      const swatch = document.createElement('button');
      swatch.type = 'button';
      swatch.style.cssText = `width:22px;height:22px;border-radius:50%;background:${c};border:2px solid transparent;cursor:pointer;padding:0;transition:.12s;flex-shrink:0`;
      swatch.title = c;
      swatch.addEventListener('click', () => {
        document.getElementById('new-board-color').value = c;
        container.querySelectorAll('button').forEach(b => b.style.borderColor = 'transparent');
        swatch.style.borderColor = '#05195f';
      });
      container.appendChild(swatch);
    });
  </script>
</body>
</html>
